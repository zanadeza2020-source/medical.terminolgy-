<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Learning Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header>
 <div class="logo">🎓 Smart Learning Hub</div>

 <div class="search-bar">
  <i class="fas fa-search"></i>
  <input placeholder="ابحث في المنصة..." onkeyup="globalSearch(this.value)">
 </div>

 <div class="theme-selector">
  <select onchange="changeTheme(this.value)">
   <option value="">Purple Pro</option>
   <option value="blue">Blue Glass</option>
   <option value="dark">Dark Neon</option>
   <option value="midnight">Midnight Black</option>
  </select>
 </div>
</header>

<div class="container" id="main"></div>

<script src="js/app.js"></script>

</body>
</html>
