<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
<title>امتحان المصطلحات الطبيه - المهندس نادر</title>

<!-- إضافة خطوط جوجل وخطوط عربية فاخرة -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<!-- إضافة أيقونات Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* متغيرات الألوان - ثيمات متعددة */
  :root {
    --primary: #5e35b1;
    --primary-light: #7e57c2;
    --primary-dark: #4527a0;
    --secondary: #ff6f00;
    --secondary-light: #ffa040;
    --danger: #d32f2f;
    --success: #2e7d32;
    --info: #0288d1;
    --warning: #f57c00;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --dark: #1e1e2f;
    --darker: #0f0f1a;
    --light: #f5f5f9;
    --white: #ffffff;
    --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --gradient-gold: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-xl: 0 16px 32px rgba(0,0,0,0.15);
    --border-radius-sm: 10px;
    --border-radius-md: 16px;
    --border-radius-lg: 24px;
    --border-radius-xl: 32px;
    --bg-opacity: 0.95;
    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* الثيم الداكن */
  body.dark-theme {
    --primary: #9575cd;
    --primary-light: #b39ddb;
    --primary-dark: #7e57c2;
    --secondary: #ffb74d;
    --secondary-light: #ffd95b;
    --danger: #ef5350;
    --success: #66bb6a;
    --info: #4fc3f7;
    --warning: #ffa726;
    --gold: #ffd54f;
    --dark: #f5f5f5;
    --darker: #e0e0e0;
    --light: #1e1e2f;
    --white: #2d2d3a;
    --gradient-1: linear-gradient(135deg, #5e35b1 0%, #311b92 100%);
    --gradient-2: linear-gradient(135deg, #c2185b 0%, #880e4f 100%);
    --gradient-3: linear-gradient(135deg, #0277bd 0%, #004c8c 100%);
    --gradient-gold: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%);
  }

  /* الثيم الذهبي */
  body.gold-theme {
    --primary: #bf9b30;
    --primary-light: #e6b422;
    --primary-dark: #a67c00;
    --secondary: #b8860b;
    --secondary-light: #daa520;
    --danger: #b22222;
    --success: #2e7d32;
    --info: #1e4b5e;
    --warning: #b76e79;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --dark: #4a3c28;
    --darker: #2c1e0e;
    --light: #faf3e0;
    --white: #fff9e6;
    --gradient-1: linear-gradient(135deg, #bf9b30 0%, #a67c00 100%);
    --gradient-2: linear-gradient(135deg, #daa520 0%, #b8860b 100%);
    --gradient-3: linear-gradient(135deg, #b8860b 0%, #8b6912 100%);
    --gradient-gold: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
  }

  /* الثيم الطبي */
  body.medical-theme {
    --primary: #00695c;
    --primary-light: #2b7a78;
    --primary-dark: #004d40;
    --secondary: #00acc1;
    --secondary-light: #4dd0e1;
    --danger: #c62828;
    --success: #2e7d32;
    --info: #0277bd;
    --warning: #f57c00;
    --gold: #ffb74d;
    --silver: #bdbdbd;
    --dark: #263238;
    --darker: #1a272e;
    --light: #e0f2f1;
    --white: #f5f5f5;
    --gradient-1: linear-gradient(135deg, #00695c 0%, #004d40 100%);
    --gradient-2: linear-gradient(135deg, #00acc1 0%, #00838f 100%);
    --gradient-3: linear-gradient(135deg, #00838f 0%, #005b5f 100%);
    --gradient-gold: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    font-size: 15px;
    -webkit-text-size-adjust: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Cairo', 'Tajawal', 'Almarai', sans-serif;
    background: var(--gradient-1);
    margin: 0;
    user-select: none;
    min-height: 100vh;
    position: relative;
    color: var(--dark);
    line-height: 1.5;
    overflow-x: hidden;
    width: 100%;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* الهيدر المتطور - أنيق ومضغوط */
  .header {
    background: rgba(255,255,255,var(--bg-opacity));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: var(--shadow-md);
    width: 100%;
    flex-wrap: wrap;
    gap: 8px;
  }

  .title {
    font-weight: 700;
    color: var(--primary-dark);
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }

  .title i {
    color: var(--gold);
    font-size: 1.3rem;
  }

  .stats-grid {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
  }

  .badge {
    padding: 6px 12px;
    border-radius: 30px;
    font-weight: 600;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: var(--shadow-sm);
    transition: var(--transition-smooth);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  .badge i {
    font-size: 0.9rem;
  }

  .timer-badge {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(255,255,255,0.9);
  }

  .viol-badge {
    border-color: var(--dark);
    color: var(--dark);
    background: rgba(255,255,255,0.9);
  }

  /* شريط المعلومات المتطور - أنيق */
  .info-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.05);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.85rem;
    color: var(--dark);
    justify-content: center;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 30px;
    transition: var(--transition-smooth);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .info-item i {
    color: var(--gold);
    font-size: 0.9rem;
  }

  /* محدد الثيمات - مضغوط */
  .theme-selector {
    display: flex;
    gap: 4px;
  }

  .theme-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--white);
    cursor: pointer;
    transition: var(--transition-smooth);
    box-shadow: var(--shadow-sm);
  }

  .theme-btn:hover {
    transform: scale(1.15);
    border-color: var(--gold);
  }

  .theme-btn.default { background: linear-gradient(135deg, #667eea, #764ba2); }
  .theme-btn.dark { background: linear-gradient(135deg, #333, #000); }
  .theme-btn.gold { background: linear-gradient(135deg, #bf9b30, #a67c00); }
  .theme-btn.medical { background: linear-gradient(135deg, #00695c, #004d40); }

  /* الحاوية الرئيسية */
  .container {
    padding: 16px 20px;
    max-width: 1000px;
    width: 100%;
    margin: 10px auto;
    min-height: calc(80vh - 80px);
    position: relative;
  }

  /* بطاقات الأسئلة - أنيقة ومتوسطة الحجم */
  .question-box {
    background: rgba(255,255,255,var(--bg-opacity));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 18px 22px;
    border-radius: var(--border-radius-md);
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: var(--shadow-md);
    transition: var(--transition-smooth);
    position: relative;
    overflow: hidden;
    width: 100%;
  }

  .question-box:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }

  .question-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--gradient-gold);
  }

  .question-box h4 {
    margin-top: 0;
    color: var(--primary-dark);
    border-bottom: 1px solid rgba(255,215,0,0.3);
    padding-bottom: 10px;
    margin-bottom: 15px;
    font-weight: 600;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    word-break: break-word;
  }

  .question-box h4 i {
    color: var(--gold);
    font-size: 1.2rem;
  }

  /* شريط التقدم المتحرك - أنيق */
  .progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    margin: 10px 0;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--gradient-gold);
    width: 0%;
    transition: width 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  /* خيارات الأسئلة - متوسطة الحجم */
  .option-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    margin: 8px 0;
    background: rgba(249,249,249,0.8);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-radius: 12px;
    cursor: pointer;
    transition: var(--transition-smooth);
    border: 1px solid transparent;
    font-weight: 500;
    font-size: 0.95rem;
    word-break: break-word;
    position: relative;
    overflow: hidden;
  }

  .option-item:hover {
    background: rgba(255,255,255,0.95);
    border-color: var(--primary-light);
    transform: translateX(-3px);
    box-shadow: var(--shadow-sm);
  }

  .option-item:has(input:checked) {
    background: rgba(200,230,200,0.9);
    border-color: var(--success);
  }

  input[type="radio"] {
    margin-left: 10px;
    transform: scale(1.1);
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  /* مؤشرات الأسئلة - مربعات متوسطة */
  .status-box {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    background: rgba(255,255,255,var(--bg-opacity));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: var(--border-radius-md);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: var(--shadow-md);
    width: 100%;
  }

  .q-indicator {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--dark);
    transition: var(--transition-smooth);
    border: 1px solid transparent;
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
    pointer-events: none;
  }

  .q-indicator.answered {
    background: var(--gradient-1);
    color: #fff;
    border-color: var(--gold);
  }

  /* أزرار التنقل - متوسطة */
  .btn-next {
    padding: 10px 30px;
    font-size: 1rem;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: var(--gradient-1);
    color: #fff;
    font-weight: 600;
    transition: var(--transition-smooth);
    box-shadow: var(--shadow-md);
    letter-spacing: 0.5px;
    width: auto;
    max-width: 100%;
    opacity: 0.9;
  }

  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    opacity: 1;
  }

  .btn-next:disabled {
    background: linear-gradient(135deg, #b0bec5, #90a4ae);
    cursor: not-allowed;
    opacity: 0.5;
  }

  /* شاشة التنبيه - سلسة وغير ثقيلة */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    display: none;
    z-index: 10000;
    align-items: center;
    justify-content: center;
    padding: 15px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .overlay-content {
    background: rgba(255,255,255,0.98);
    border-radius: var(--border-radius-md);
    padding: 24px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    border-top: 4px solid var(--danger);
    box-shadow: var(--shadow-lg);
    transform: scale(1);
    animation: scaleIn 0.2s ease;
  }

  @keyframes scaleIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .btn-confirm {
    background: var(--gradient-1);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 16px;
    font-size: 0.95rem;
    transition: var(--transition-smooth);
    box-shadow: var(--shadow-sm);
    width: auto;
  }

  .btn-confirm:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  /* تقرير النتائج */
  .report-card {
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 24px;
    border-radius: var(--border-radius-md);
    margin-top: 20px;
    box-shadow: var(--shadow-lg);
    border-top: 4px solid var(--gold);
    animation: slideUp 0.3s ease;
    width: 100%;
  }

  /* لوحة المعلومات */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin: 20px 0;
  }

  .dashboard-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-radius: var(--border-radius-md);
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    transition: var(--transition-smooth);
    text-align: center;
  }

  .dashboard-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }

  .dashboard-card i {
    font-size: 1.8rem;
    margin-bottom: 8px;
  }

  /* جدول المقارنة */
  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    font-size: 0.9rem;
  }

  .comparison-table th {
    background: var(--gradient-1);
    color: white;
    padding: 10px;
    font-weight: 600;
  }

  .comparison-table td {
    padding: 8px 10px;
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid #eee;
  }

  /* توقيع المهندس نادر */
  .signature {
    text-align: center;
    margin-top: 25px;
    padding: 12px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-radius: var(--border-radius-md);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-weight: 600;
    font-size: 0.9rem;
    position: relative;
    overflow: hidden;
  }

  .engineer {
    color: var(--gold);
    font-weight: 700;
  }

  .nader {
    color: #fff;
    font-weight: 700;
    background: var(--gradient-gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hidden { display: none; }

  /* تحسينات للشاشات الصغيرة */
  @media (max-width: 480px) {
    .header {
      flex-direction: column;
      align-items: stretch;
    }
    
    .stats-grid {
      justify-content: center;
      width: 100%;
    }
    
    .info-bar {
      flex-direction: column;
    }
    
    .info-item {
      width: 100%;
    }
    
    .q-indicator {
      width: 34px;
      height: 34px;
      font-size: 0.85rem;
    }
  }

  @media (min-width: 481px) and (max-width: 768px) {
    .q-indicator {
      width: 36px;
      height: 36px;
    }
  }
</style>
</head>

<body oncontextmenu="return false;">

<!-- الهيدر المتطور -->
<div class="header">
  <div class="title">
    <i class="fas fa-gem"></i>
    📋 امتحان المصطلحات
  </div>
  <div class="stats-grid">
    <!-- محدد الثيمات -->
    <div class="theme-selector">
      <div class="theme-btn default" onclick="setTheme('default')" title="الثيم الافتراضي"></div>
      <div class="theme-btn dark" onclick="setTheme('dark')" title="الثيم الداكن"></div>
      <div class="theme-btn gold" onclick="setTheme('gold')" title="الثيم الذهبي"></div>
      <div class="theme-btn medical" onclick="setTheme('medical')" title="الثيم الطبي"></div>
    </div>
    
    <div class="badge viol-badge">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="violCount">0</span>/3
    </div>
    <div class="badge timer-badge">
      <i class="fas fa-hourglass-half"></i>
      <span id="timeDisplay">30:00</span>
    </div>
    <div class="badge timer-badge">
      <i class="fas fa-redo-alt"></i>
      <span id="attemptsLeft">3</span>/3
    </div>
  </div>
</div>

<!-- شريط المعلومات -->
<div class="info-bar" id="infoBar">
  <div class="info-item">
    <i class="fas fa-clock"></i>
    <span id="currentTime"></span>
  </div>
  <div class="info-item">
    <i class="fas fa-wifi"></i>
    <span id="connectionStatus">جاري الفحص...</span>
  </div>
  <div class="info-item">
    <i class="fas fa-battery-three-quarters"></i>
    <span id="batteryStatus">البطارية...</span>
  </div>
</div>

<!-- شريط التقدم -->
<div class="progress-container">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="container">
  <div id="examMain">
    <div id="questionArea"></div>
    <div class="nav-area" style="text-align: center; margin: 20px 0;">
      <button id="nextBtn" class="btn-next" onclick="nextPage()" disabled>
        <i class="fas fa-arrow-left"></i>
        التالي
        <i class="fas fa-arrow-right"></i>
      </button>
    </div>
    <div class="status-box" id="statusGrid"></div>
  </div>

  <div id="resultArea" class="hidden">
    <div class="report-card" id="finalReport"></div>
  </div>
  
  <div class="signature">
    <i class="fas fa-crown"></i>
    <span class="engineer">المهندس</span>
    <span class="nader">نادر</span>
    <i class="fas fa-code"></i>
    <br>
    <small>© 2026</small>
  </div>
</div>

<div id="alertOverlay" class="overlay">
  <div class="overlay-content">
    <i class="fas fa-exclamation-circle" style="font-size: 2.5rem; color: var(--danger); margin-bottom: 10px;"></i>
    <h3 style="color:var(--danger); margin-bottom: 8px;">تنبيه!</h3>
    <p id="alertMsg" style="font-size: 0.95rem; margin: 10px 0;"></p>
    <button class="btn-confirm" onclick="closeWarning()">
      <i class="fas fa-check"></i> حسناً
    </button>
  </div>
</div>

<script>
/* ===================== الإعدادات الأساسية ===================== */
const TOTAL_QUESTIONS = 50;
const Q_PER_PAGE = 2;
const EXAM_TIME_MIN = 30;
const AUTO_TERMINATE_AT = 3;
const MAX_ATTEMPTS = 3;

// معرف جلسة فريد لكل مستخدم
const SESSION_ID = 'user_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now();

/* ===================== الأسئلة ===================== */
const questions = [

/* ===================== نظام الصوت المتقدم - يعمل حتى مع كتم الصوت ===================== */
const SoundSystem = {
  audioContext: null,
  initialized: false,
  
  init() {
    try {
      this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch (e) {
      console.log('صوت غير مدعوم');
    }
  },
  
  async playSound(type) {
    if (!this.initialized) this.init();
    if (!this.audioContext) return;
    
    try {
      if (this.audioContext.state === 'suspended') {
        await this.audioContext.resume();
      }
      
      const oscillator = this.audioContext.createOscillator();
      const gainNode = this.audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(this.audioContext.destination);
      
      // تجاهل إعدادات كتم الصوت في الجهاز
      gainNode.gain.value = 0.4;
      
      switch(type) {
        case 'warning':
          oscillator.frequency.setValueAtTime(880, this.audioContext.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(440, this.audioContext.currentTime + 0.2);
          oscillator.start();
          oscillator.stop(this.audioContext.currentTime + 0.2);
          break;
          
        case 'violation':
          oscillator.frequency.setValueAtTime(880, this.audioContext.currentTime);
          oscillator.frequency.setValueAtTime(440, this.audioContext.currentTime + 0.1);
          oscillator.frequency.setValueAtTime(880, this.audioContext.currentTime + 0.2);
          oscillator.start();
          oscillator.stop(this.audioContext.currentTime + 0.3);
          break;
          
        case 'timeWarning':
          oscillator.frequency.setValueAtTime(659.25, this.audioContext.currentTime);
          oscillator.frequency.setValueAtTime(783.99, this.audioContext.currentTime + 0.15);
          oscillator.frequency.setValueAtTime(880.00, this.audioContext.currentTime + 0.3);
          oscillator.start();
          oscillator.stop(this.audioContext.currentTime + 0.45);
          break;
          
        case 'start':
          oscillator.frequency.setValueAtTime(523.25, this.audioContext.currentTime);
          oscillator.frequency.setValueAtTime(659.25, this.audioContext.currentTime + 0.15);
          oscillator.frequency.setValueAtTime(783.99, this.audioContext.currentTime + 0.3);
          oscillator.start();
          oscillator.stop(this.audioContext.currentTime + 0.45);
          break;
          
        case 'end':
          oscillator.frequency.setValueAtTime(783.99, this.audioContext.currentTime);
          oscillator.frequency.setValueAtTime(659.25, this.audioContext.currentTime + 0.15);
          oscillator.frequency.setValueAtTime(523.25, this.audioContext.currentTime + 0.3);
          oscillator.start();
          oscillator.stop(this.audioContext.currentTime + 0.45);
          break;
      }
    } catch (e) {}
  }
};

let attempts = {
  current: 1,
  max: MAX_ATTEMPTS,
  sessionId: SESSION_ID
};

function loadAttempts() {
  // استخدام معرف جلسة فريد لكل مستخدم
  const saved = localStorage.getItem(`exam_attempts_${SESSION_ID}`);
  if (saved) {
    attempts = JSON.parse(saved);
  } else {
    saveAttempts();
  }
  updateAttemptsDisplay();
}

function saveAttempts() {
  localStorage.setItem(`exam_attempts_${SESSION_ID}`, JSON.stringify(attempts));
}

function updateAttemptsDisplay() {
  document.getElementById('attemptsLeft').textContent = attempts.current;
}

function canStartExam() {
  return attempts.current <= attempts.max;
}

function useAttempt() {
  if (attempts.current <= attempts.max) {
    attempts.current++;
    saveAttempts();
    updateAttemptsDisplay();
    return true;
  }
  return false;
}

function resetAttempts() {
  attempts.current = 1;
  saveAttempts();
  alert('تم إعادة تعيين المحاولات');
  location.reload();
}

/* ===================== معلومات الوقت والبطارية والاتصال ===================== */
function updateCurrentTime() {
  const now = new Date();
  const options = { 
    hour: '2-digit', 
    minute: '2-digit', 
    second: '2-digit',
    hour12: true 
  };
  document.getElementById('currentTime').textContent = now.toLocaleString('ar-SA', options);
}

function updateConnectionStatus() {
  const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (connection) {
    const type = connection.effectiveType || '4G';
    document.getElementById('connectionStatus').textContent = `متصل (${type})`;
  } else {
    document.getElementById('connectionStatus').textContent = navigator.onLine ? 'متصل' : 'غير متصل';
  }
}

async function updateBatteryInfo() {
  if (navigator.getBattery) {
    try {
      const battery = await navigator.getBattery();
      
      function updateBatteryDisplay() {
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? '⚡' : '';
        document.getElementById('batteryStatus').textContent = `${level}% ${charging}`;
      }
      
      updateBatteryDisplay();
      battery.addEventListener('levelchange', updateBatteryDisplay);
      battery.addEventListener('chargingchange', updateBatteryDisplay);
    } catch (e) {
      document.getElementById('batteryStatus').textContent = 'غير متاحة';
    }
  } else {
    document.getElementById('batteryStatus').textContent = 'غير مدعومة';
  }
}

  copyAttempts: 0,

};
let examStartedAt = Date.now();

/* ===================== أنظمة الحماية ===================== */

// كشف أدوات المطور
function detectDevTools() {
  const start = performance.now();
  debugger;
  const end = performance.now();
  if (end - start > 100) {
    cheatLog.devTools++;
    logViolation("أدوات مطور", "تم كشف فتح أدوات المطور", 'violation');
  }
}
setInterval(detectDevTools, 2000);

// كشف مغادرة الصفحة
document.addEventListener("visibilitychange", () => {
  if (isExamFinished) return;
  
  if (document.hidden) {
    cheatLog.tabSwitches++;
    cheatLog.awayStart = Date.now();
    logViolation("مغادرة", "تبديل التبويب", 'violation');
  } else {
    if (cheatLog.awayStart) {
      const awayTime = Math.floor((Date.now() - cheatLog.awayStart) / 1000);
      cheatLog.totalAwayTime += awayTime;
      cheatLog.awayStart = null;
      logViolation("عودة", `غبت ${awayTime} ث`, 'warning');
    }
  }
});

// كشف فقدان التركيز
window.addEventListener("blur", () => {
  if (isExamFinished) return;
  cheatLog.focusLoss++;
  cheatLog.awayStart = Date.now();
  logViolation("فقدان تركيز", "النقر خارج الامتحان", 'violation');
});

// كشف محاولة إغلاق النافذة
window.addEventListener("beforeunload", (e) => {
  if (isExamFinished) return;
  cheatLog.pageExits++;
  logViolation("خروج", "محاولة إغلاق النافذة", 'violation');
  e.preventDefault();
  e.returnValue = "";
});

// كشف تغيير الرابط
window.addEventListener("hashchange", (e) => {
  if (isExamFinished) return;
  cheatLog.forbiddenKeys++;
  logViolation("تغيير رابط", "محاولة تغيير الرابط", 'violation');
  history.pushState(null, null, window.location.pathname);
});

// منع التصوير
if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
  navigator.mediaDevices.getDisplayMedia = function() {
    cheatLog.screenshotAttempts++;
    logViolation("تصوير", "محاولة تصوير الشاشة", 'violation');
    return Promise.reject(new Error("التصوير ممنوع"));
  };
}

// منع القوائم المختصرة
document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  cheatLog.forbiddenKeys++;
  logViolation("قائمة", "قائمة مختصرة", 'warning');
});

// منع النسخ
document.addEventListener("copy", (e) => {
  e.preventDefault();
  cheatLog.copyAttempts++;
  logViolation("نسخ", "محاولة نسخ", 'warning');
});

// منع اختصارات لوحة المفاتيح
document.addEventListener('keydown', (e) => {
  if (isExamFinished) return;
  
  const forbiddenCombos = [
    e.key === 'F12',
    (e.ctrlKey && e.shiftKey && e.key === 'I'),
    (e.ctrlKey && e.key === 'u'),
    (e.key === 'PrintScreen')
  ];
  
  if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
    e.preventDefault();
    cheatLog.refreshAttempts++;
    logViolation("تحديث", "محاولة تحديث", 'violation');
  } else if (forbiddenCombos.some(combo => combo)) {
    e.preventDefault();
    cheatLog.forbiddenKeys++;
    logViolation("مفاتيح", "مفاتيح ممنوعة", 'violation');
  }
});

/* ===================== المحرك الأساسي ===================== */

function loadState() {
  if (!canStartExam()) {
    alert('انتهت المحاولات');
    return false;
  }
  
  const saved = localStorage.getItem(`exam_session_${SESSION_ID}`);
  if (saved) {
    const data = JSON.parse(saved);
    answers = data.answers;
    currentPage = data.currentPage;
    timeLeft = data.timeLeft;
    cheatLog = data.cheatLog;
    examStartedAt = data.examStartedAt;
    return true;
  }
  return false;
}

function saveState() {
  if (isExamFinished) return;
  const state = { answers, currentPage, timeLeft, cheatLog, examStartedAt };
  localStorage.setItem(`exam_session_${SESSION_ID}`, JSON.stringify(state));
}

setInterval(saveState, 2000);

function updateProgress() {
  const answeredCount = answers.filter(a => a !== null).length;
  const progress = (answeredCount / TOTAL_QUESTIONS) * 100;
  document.getElementById('progressFill').style.width = `${progress}%`;
}

function logViolation(type, msg, soundType = 'warning') {
  if (isExamFinished) return;
  
  SoundSystem.playSound(soundType);
  
  cheatLog.events.push({
    t: formatMMSS(Math.floor((Date.now() - examStartedAt) / 1000)),
    type: type,
    message: msg
  });

  document.getElementById("alertMsg").textContent = msg;
  document.getElementById("alertOverlay").style.display = "flex";
  
  const totalViolations = updateViolationUI();
  saveState();

  if (totalViolations >= AUTO_TERMINATE_AT) {
    setTimeout(() => {
      closeWarning();
      submitExam(true);
    }, 1500);
  }
}

function updateViolationUI() {
  const total = cheatLog.tabSwitches + cheatLog.focusLoss + cheatLog.refreshAttempts + 
                cheatLog.forbiddenKeys + cheatLog.devTools + cheatLog.copyAttempts + 
                cheatLog.screenshotAttempts + cheatLog.pageExits;
  document.getElementById("violCount").textContent = total;
  return total;
}

function closeWarning() {
  document.getElementById("alertOverlay").style.display = "none";
}

function buildStatusGrid() {
  const grid = document.getElementById("statusGrid");
  grid.innerHTML = "";
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const div = document.createElement("div");
    div.id = `qInd${i}`;
    div.className = "q-indicator" + (answers[i] !== null ? " answered" : "");
    div.textContent = i + 1;
    grid.appendChild(div);
  }
}

function renderPage() {
  const area = document.getElementById("questionArea");
  area.innerHTML = "";
  const start = currentPage * Q_PER_PAGE;
  const end = Math.min(start + Q_PER_PAGE, TOTAL_QUESTIONS);

  for (let i = start; i < end; i++) {
    const q = questions[i];
    const box = document.createElement("div");
    box.className = "question-box";
    
    const typeIcon = q.type === "tf" ? 
      '<i class="fas fa-check-circle" style="color: var(--info);"></i>' : 
      '<i class="fas fa-list-ul" style="color: var(--success);"></i>';
    
    box.innerHTML = `<h4>
      ${typeIcon} سؤال ${i+1}: ${q.text}
    </h4>`;

    if (q.type === "tf") {
      ["صح", "خطأ"].forEach(opt => {
        box.innerHTML += `
          <label class="option-item">
            <input type="radio" name="q${i}" value="${opt}" ${answers[i] === opt ? 'checked' : ''} onchange="saveAnswer(${i}, '${opt}')"> 
            <i class="fas ${opt === 'صح' ? 'fa-check' : 'fa-times'}" style="color: ${opt === 'صح' ? 'var(--success)' : 'var(--danger)'}; margin-left: 5px;"></i>
            ${opt}
          </label>`;
      });
    } else {
      q.options.forEach((opt, idx) => {
        box.innerHTML += `
          <label class="option-item">
            <input type="radio" name="q${i}" value="${idx}" ${answers[i] == idx ? 'checked' : ''} onchange="saveAnswer(${i}, ${idx})"> 
            <i class="fas fa-circle" style="color: var(--gold); font-size: 0.6rem; margin-left: 5px;"></i>
            ${opt}
          </label>`;
      });
    }
    area.appendChild(box);
  }
  checkCompletion();
}

function saveAnswer(qIdx, val) {
  answers[qIdx] = val;
  document.getElementById(`qInd${qIdx}`).classList.add("answered");
  saveState();
  checkCompletion();
  updateProgress();
}

function checkCompletion() {
  const start = currentPage * Q_PER_PAGE;
  const end = Math.min(start + Q_PER_PAGE, TOTAL_QUESTIONS);
  let allDone = true;
  for (let i = start; i < end; i++) {
    if (answers[i] === null) allDone = false;
  }
  document.getElementById("nextBtn").disabled = !allDone;
}

function nextPage() {
  if (currentPage < (TOTAL_QUESTIONS / Q_PER_PAGE) - 1) {
    currentPage++;
    renderPage();
    window.scrollTo({top: 0, behavior: 'smooth'});
    saveState();
  } else {
    submitExam(false);
  }
}

function startTimer() {
  const timer = setInterval(() => {
    if (isExamFinished) { clearInterval(timer); return; }
    
    timeLeft--;
    document.getElementById("timeDisplay").textContent = formatMMSS(timeLeft);

    if (timeLeft === 300) {
      logViolation("وقت", "5 دقائق متبقية", 'timeWarning');
    }
    if (timeLeft === 60) {
      logViolation("وقت", "دقيقة واحدة متبقية", 'timeWarning');
    }

    if (timeLeft <= 0) {
      clearInterval(timer);
      submitExam(false);
    }
  }, 1000);
}

function formatMMSS(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function setTheme(theme) {
  document.body.className = theme + '-theme';
  localStorage.setItem(`exam_theme_${SESSION_ID}`, theme);
}

function loadTheme() {
  const savedTheme = localStorage.getItem(`exam_theme_${SESSION_ID}`) || 'default';
  setTheme(savedTheme);
}

  updateConnectionStatus();
  updateBatteryInfo();
  
  loadState();
  buildStatusGrid();
  renderPage();
  startTimer();
  updateViolationUI();
  updateProgress();
}

function submitExam(isTerminated) {
  if (isExamFinished) return;
  isExamFinished = true;
  
  SoundSystem.playSound('end');
  
  if (!isTerminated) {
    useAttempt();
  }
  
  localStorage.removeItem(`exam_session_${SESSION_ID}`);

  let score = 0;
  const answersDetail = [];
  
  questions.forEach((q, i) => {
    let isCorrect = false;
    if (q.type === "tf") {
      isCorrect = answers[i] === q.correct;
    } else {
      isCorrect = answers[i] == q.correct;
    }
    if (isCorrect) score++;
    answersDetail.push({
      question: q.text.substring(0, 40) + (q.text.length > 40 ? '...' : ''),
      userAnswer: answers[i],
      correctAnswer: q.type === "tf" ? q.correct : q.options[q.correct].substring(0, 20),
      isCorrect: isCorrect
    });
  });

  const percentage = (score / TOTAL_QUESTIONS) * 100;
  let gradeColor = percentage >= 90 ? 'var(--success)' : percentage >= 70 ? 'var(--info)' : percentage >= 50 ? 'var(--warning)' : 'var(--danger)';
  let gradeText = percentage >= 90 ? 'امتياز' : percentage >= 70 ? 'جيد جداً' : percentage >= 50 ? 'مقبول' : 'راسب';

  document.getElementById("examMain").classList.add("hidden");
  document.getElementById("resultArea").classList.remove("hidden");

  let reportHtml = `
    <h3 style="text-align:center; margin-bottom: 15px;">${isTerminated ? '❌ تم إنهاء الامتحان' : '✅ انتهى الامتحان'}</h3>
    
    <div class="dashboard-grid">
      <div class="dashboard-card">
        <i class="fas fa-star" style="color: var(--gold);"></i>
        <div style="font-size: 2rem; font-weight: 700; color: ${gradeColor};">${score}</div>
        <div>من ${TOTAL_QUESTIONS}</div>
        <div style="font-size: 0.9rem;">${percentage.toFixed(1)}% - ${gradeText}</div>
      </div>
      
      <div class="dashboard-card">
        <i class="fas fa-clock" style="color: var(--info);"></i>
        <div style="font-size: 1.8rem;">${formatMMSS(Math.floor((Date.now() - examStartedAt) / 1000))}</div>
        <div style="font-size: 0.85rem;">الوقت المستغرق</div>
      </div>
      
      <div class="dashboard-card">
        <i class="fas fa-shield-alt" style="color: var(--danger);"></i>
        <div style="font-size: 1.8rem;">${updateViolationUI()}</div>
        <div style="font-size: 0.85rem;">مخالفات</div>
      </div>
    </div>

    <h4 style="margin: 15px 0 10px;"><i class="fas fa-list-check"></i> مقارنة الإجابات</h4>
    <div style="max-height: 300px; overflow-y: auto; border-radius: 12px;">
      <table class="comparison-table">
        <thead><tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th></tr></thead>
        <tbody>
          ${answersDetail.map((detail, i) => `
            <tr>
              <td>${i+1}</td>
              <td>${detail.question}</td>
              <td style="color: ${detail.isCorrect ? 'var(--success)' : 'var(--danger)'};">${detail.userAnswer !== null ? (typeof detail.userAnswer === 'number' ? String.fromCharCode(65 + detail.userAnswer) : detail.userAnswer) : '-'}</td>
              <td>${detail.correctAnswer}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <button onclick="startNewExam()" style="margin-top:20px; width:100%; padding:12px; background:var(--gradient-1); color:#fff; border:none; border-radius:30px; cursor:pointer; font-size:1rem;">
      <i class="fas fa-redo-alt"></i> بدء جديد
    </button>
  `;
  document.getElementById("finalReport").innerHTML = reportHtml;
}

function startNewExam() {
  if (attempts.current <= attempts.max) {
    location.reload();
  } else {
    alert('انتهت المحاولات');
  }
}

// بدء التشغيل
loadTheme();
initExam();
</script>
