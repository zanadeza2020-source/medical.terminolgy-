<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Learning Hub - الإصدار المتطور</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- ملف التنسيق الخارجي -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<header id="main-header">
    <div class="logo">
        <i class="fas fa-graduation-cap"></i>
        Smart Learning Hub
    </div>
    
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="ابحث في المنصة..." onkeyup="globalSearch(this.value)">
    </div>
    
    <div class="theme-selector">
        <select onchange="changeTheme(this.value)">
            <option value="midnight">⚫ Midnight Void (افتراضي)</option>
            <option value="purple">👑 Royal Purple</option>
            <option value="emerald">💎 Emerald Ocean</option>
            <option value="amber">🌅 Sunset Amber</option>
            <option value="rose">🌸 Rose Quartz</option>
            <option value="dark">🌌 Dark Nebula</option>
        </select>
    </div>
</header>

<div class="container" id="main"></div>

<!-- ملف الجافاسكربت الخارجي -->
<script src="app.js"></script>

</body>
</html>
